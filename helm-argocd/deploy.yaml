depends:
  - helm-redis

steps:
  - type: decrypt-sops
    environments:
      cloud:
        config:
          keyParameter: SOPS_AGE_KEY
          files:
            - environments/cloud/argocd.values.yaml
            - environments/cloud/main.yaml
  - type: helm
    environments:
      cloud:
        config:
          repoName: argo
          repoUrl: https://argoproj.github.io/argo-helm
          chartName: argo/argo-cd
          version: 7.7.16
          releaseName: argocd
          namespace: argocd
          values:
            - environments/cloud/argocd.values.yaml
  - type: shell
    environments:
      cloud:
        config:
          command: |
            kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=120s
            kubectl wait --for=condition=Established crd/appprojects.argoproj.io --timeout=120s

  - type: manifest
    environments:
      cloud:
        config:
          file:
            - environments/cloud/main.yaml
