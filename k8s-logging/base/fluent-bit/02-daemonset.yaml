apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
      annotations:
        checksum/config: "{{CONFIG_CHECKSUM}}"
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:4.2
          resources:
            limits:
              memory: 200Mi
              cpu: 500m
            requests:
              cpu: 100m
              memory: 100Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/
            - name: storage
              mountPath: /buffers
          securityContext:
            runAsUser: 0
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
        - name: storage
          hostPath:
            path: /var/lib/fluent-bit
            type: DirectoryOrCreate
      tolerations:
        - operator: "Exists"
