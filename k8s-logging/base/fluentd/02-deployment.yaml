apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluentd
  namespace: logging
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 999:999 /fluentd/buffer"]
          volumeMounts:
            - name: buffer
              mountPath: /fluentd/buffer
      containers:
        - name: fluentd
          image: nazman/fluentd:v1.16-debian
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: config
              mountPath: /fluentd/etc
            - name: log
              mountPath: /fluentd/log
            - name: buffer
              mountPath: /fluentd/buffer
          livenessProbe:
            tcpSocket:
              port: 24224
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 24224
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: fluentd-config
        - name: log
          persistentVolumeClaim:
            claimName: fluentd-logs
        - name: buffer
          hostPath:
            path: /var/lib/fluentd/buffer
            type: DirectoryOrCreate
