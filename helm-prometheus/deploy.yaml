steps:

  - type: helm
    environments:

      cloud:
        config:
          repoName: prometheus-community
          epoUrl: https://prometheus-community.github.io/helm-charts
          chartName: prometheus-community/prometheus
          version: 82.10.3
          releaseName: prometheus
          namespace: monitoring
          values:
            - environments/cloud/prometheus-values.yaml
      onprem:
        config:
          repoName: prometheus-community
          repoUrl: https://prometheus-community.github.io/helm-charts
          chartName: prometheus-community/prometheus
          version: 82.10.3
          releaseName: prometheus
          namespace: monitoring
          values:
            - environments/onprem/prometheus-values.yaml