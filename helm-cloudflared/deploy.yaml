steps:

  - type: helm
    environments:

      cloud:
        config:
          repoName: cloudflare
          repoUrl: https://cloudflare.github.io/helm-charts
          chartName: cloudflare/cloudflared
          version: 2.0.0
          releaseName: cloudflared
          namespace: cloudflare
          values:
            - environments/cloud/cloudflared.values.yaml
      