name: Automerge
on:
  workflow_run:
    workflows: ["Auto PR"]
    types:
      - completed
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: automerge
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const prs = await github.rest.pulls.list({
              owner, repo,
              state: 'open'
            });

            const targets = prs.data.filter(pr =>
              pr.labels.some(l => l.name === 'automerge')
            );

            if (targets.length === 0) {
              core.info('No open PRs with automerge label found');
              return;
            }

            for (const pr of targets) {
              core.info(`Merging PR #${pr.number}: ${pr.title}`);
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              core.info(`PR #${pr.number} merged successfully`);
            }
