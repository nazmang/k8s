name: Automerge
on:
  workflow_run:
    workflows: ["Auto PR"]
    types:
      - completed
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: automerge
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const { owner, repo } = context.repo;

            const prs = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${headBranch}`,
              base: 'main',
              state: 'open'
            });

            if (prs.data.length === 0) {
              core.info(`No open PR found for branch ${headBranch}`);
              return;
            }

            const pr = prs.data[0];
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('automerge')) {
              core.info(`PR #${pr.number} does not have automerge label, skipping`);
              return;
            }

            core.info(`Merging PR #${pr.number}: ${pr.title}`);
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            core.info(`PR #${pr.number} merged successfully`);
