name: Auto PR

on:
  workflow_run:
    workflows: ["gitleaks"]
    types:
      - completed
    branches:
      - feature
      - argocd
      - cloud-build

jobs:
  create-pull-request:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create Pull Request
        id: create
        uses: actions/github-script@v6
        with:
          script: |
            const { repo, owner } = context.repo;
            const headBranch = context.payload.workflow_run.head_branch;
            const baseBranch = 'main'; // change to default branch name

            if (headBranch === baseBranch) {
              core.info(`Skip: head == base (${headBranch})`);
              return;
            }

            let pr;
            try {
              const result = await github.rest.pulls.create({
                title: `[AutoPR] ${headBranch} -> ${baseBranch}`,
                owner,
                repo,
                head: headBranch,
                base: baseBranch,
                body: [
                  'This PR is auto-generated by',
                  '[actions/github-script](https://github.com/actions/github-script).'
                ].join('\n')
              });
              pr = result.data;
            } catch (e) {
              if (e.status === 422) {
                core.info('PR already exists, finding it...');
                const existing = await github.rest.pulls.list({
                  owner, repo,
                  head: `${owner}:${headBranch}`,
                  base: baseBranch,
                  state: 'open'
                });
                if (existing.data.length === 0) {
                  core.info('No open PR found, skipping.');
                  return;
                }
                pr = existing.data[0];
              } else {
                throw e;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ['automated-pr', 'automerge']
            });

            core.setOutput("pr_number", pr.number);

      # - name: Enable Auto-Merge
      #   if: steps.create.outputs.pr_number != ''
      #   uses: peter-evans/enable-pull-request-automerge@v2
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     pull-request-number: ${{ steps.create.outputs.pr_number }}
      #     merge-method: squash
