apiVersion: batch/v1
kind: CronJob
metadata:
    name: sync-cert-to-nfs
    namespace: cert-comintern
spec:
    # each 30 min
    schedule: '*/30 * * * *'
    jobTemplate:
        spec:
            template:
                spec:
                    restartPolicy: OnFailure
                    volumes:
                        - name: cert-secret
                          secret:
                            secretName: comintern-cert-tls
                        - name: cert-nfs
                          persistentVolumeClaim:
                            claimName: cert-nfs-pvc
                    containers:
                        - name: sync
                          image: busybox
                          command:
                            - /bin/sh
                            - -c
                          args:
                            - mkdir -p /nfs/comintern.local/ && cp /cert/tls.crt /nfs/comintern.local/comintern.crt && cp /cert/tls.key /nfs/comintern.local/comintern.key
                          volumeMounts:
                            - mountPath: /cert
                              name: cert-secret
                              readOnly: true
                            - mountPath: /nfs
                              name: cert-nfs
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
